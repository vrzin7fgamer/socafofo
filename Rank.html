<style>

<body>

  </div>
  <div id="particles"></div>

      <h2 id="progressTitle">📊 Progresso</h2>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-label">Atual</div><div class="stat-value" id="statCurrent">0</div></div>
        <div class="stat-box"><div class="stat-label">Recorde</div><div class="stat-value" id="statMax">0</div></div>
        <div class="stat-box"><div class="stat-label">Variação</div><div class="stat-value" id="statDelta">0</div></div>
      </div>
      <div class="section-title">📈 Evolução das metas</div>
      <div class="chart-container"><canvas id="progressChart"></canvas></div>
      <div class="section-title">📜 Histórico</div>
      <div class="history-list" id="historyList"></div>
      <div class="modal-actions" style="margin-top: 20px;"><button class="btn" id="progressClose">Fechar</button></div>
    </div>
  </div>

  <div id="toast"></div>

<script>
const ADMIN_PASSWORD = "Dark1277";
const ADMIN_KEY = "eqp_admin_session";
const TOTAL_MEMBERS = 50;
const TITLE_TEXT = "⚡ EQP TREM BALA ⚡";
const LOADER_TEXT = "EQP TREM BALA";

let members = [];
let previousRanking = {};
let isAdmin = false;
let editingId = null;
let chartInstance = null;
let searchTerm = "";
let firstLoad = true;
let prevTop1Id = null;

function buildLoaderLogo() {
  const el = document.getElementById("loaderLogo");
  el.innerHTML = "";
  [...LOADER_TEXT].forEach((ch, i) => {
    const s = document.createElement("span");
    s.className = "letter";
    s.style.animationDelay = `${i * 0.08}s`;
    s.textContent = ch === " " ? "\u00A0" : ch;
    el.appendChild(s);
  });
}

function buildTitle() {
  const el = document.getElementById("mainTitle");
  el.innerHTML = "";
  [...TITLE_TEXT].forEach((ch, i) => {
    const s = document.createElement("span");
    s.className = "char";
    s.style.setProperty("--i", i);
    s.textContent = ch === " " ? "\u00A0" : ch;
    el.appendChild(s);
  });
}

function hideLoader() { document.getElementById("loader").classList.add("hidden"); }

function spawnParticles() {
  const container = document.getElementById("particles");
  for (let i = 0; i < 40; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "%";
    p.style.animationDuration = (8 + Math.random() * 10) + "s";
    p.style.animationDelay = (Math.random() * 10) + "s";
    p.style.width = (1 + Math.random() * 2) + "px";
    p.style.height = p.style.width;
    container.appendChild(p);
  }
}

function waitForFirebase() {
  return new Promise((resolve, reject) => {
    let tries = 0;
    const check = () => {
      if (window.fb) return resolve();
      if (++tries > 50) return reject(new Error("Firebase não carregado"));
      setTimeout(check, 100);
    };
    check();
  });
}

async function initFirebase() {
  try {
    await waitForFirebase();
    const { ref, onValue, db } = window.fb;
    const membersRef = ref(db, "members");
    onValue(membersRef, (snapshot) => {
      const data = snapshot.val();
      if (!data) { seedInitialMembers(); return; }
      const arr = Object.values(data);
      members = arr;
      members.forEach(m => { if (!m.history) m.history = []; });
      setConnection(true);
      renderRanking();
      document.getElementById("loaderStatus").textContent = "Pronto!";
      setTimeout(hideLoader, 400);
      firstLoad = false;
    }, (err) => {
      console.error(err);
      setConnection(false);
      document.getElementById("loaderStatus").textContent = "⚠️ Erro de conexão - verifique a config do Firebase";
    });
  } catch (e) {
    console.error(e);
    document.getElementById("loaderStatus").textContent = "⚠️ Erro ao carregar Firebase";
  }
}

function seedInitialMembers() {
  const { ref, set, db } = window.fb;
  const obj = {};
  for (let i = 1; i <= TOTAL_MEMBERS; i++) {
    obj[i] = { id: i, name: `Membro ${String(i).padStart(2, '0')}`, metas: 0, history: [] };
  }
  set(ref(db, "members"), obj);
}

async function saveMemberRemote(member) {
  const { ref, set, db } = window.fb;
  await set(ref(db, `members/${member.id}`), member);
}

async function resetAllRemote() {
  const { ref, set, db } = window.fb;
  const obj = {};
  for (let i = 1; i <= TOTAL_MEMBERS; i++) {
    obj[i] = { id: i, name: `Membro ${String(i).padStart(2, '0')}`, metas: 0, history: [] };
  }
  await set(ref(db, "members"), obj);
}

function setConnection(ok) {
  const dot = document.getElementById("connDot");
  const txt = document.getElementById("connText");
  if (ok) { dot.classList.remove("offline"); txt.textContent = "AO VIVO • Conectado"; }
  else { dot.classList.add("offline"); txt.textContent = "Offline"; }
}

function checkAdminSession() {
  isAdmin = sessionStorage.getItem(ADMIN_KEY) === "true";
  updateAdminUI();
}

function updateAdminUI() {
  document.getElementById("loginBtn").style.display = isAdmin ? "none" : "inline-block";
  document.getElementById("logoutBtn").style.display = isAdmin ? "inline-block" : "none";
  document.getElementById("resetBtn").style.display = isAdmin ? "inline-block" : "none";
  document.getElementById("adminStatus").style.display = isAdmin ? "inline-flex" : "none";
}

function renderRanking() {
  const sorted = [...members].sort((a, b) => b.metas - a.metas);
  const filtered = searchTerm ? sorted.filter(m => m.name.toLowerCase().includes(searchTerm.toLowerCase())) : sorted;
  const container = document.getElementById("ranking");
  const newPositions = {};
  sorted.forEach((m, idx) => newPositions[m.id] = idx + 1);
  container.innerHTML = "";

  filtered.forEach((m, idx) => {
    const fullPos = newPositions[m.id];
    let topClass = "", medal = "";
    if (fullPos === 1) { topClass = "top-1"; medal = "🥇"; }
    else if (fullPos === 2) { topClass = "top-2"; medal = "🥈"; }
    else if (fullPos === 3) { topClass = "top-3"; medal = "🥉"; }

    let rankClass = "";
    if (!firstLoad && previousRanking[m.id] !== undefined) {
      if (previousRanking[m.id] > fullPos) rankClass = "rank-up";
      else if (previousRanking[m.id] < fullPos) rankClass = "rank-down";
    }

    const card = document.createElement("div");
    card.className = `card ${topClass} ${rankClass}`;
    card.dataset.memberId = m.id;
    card.style.animationDelay = (idx * 0.02) + "s";
    card.innerHTML = `
      <div class="position">${medal ? `<span class="medal">${medal}</span>` : ""}#${fullPos}</div>
      <div class="info">
        <div class="name">${escapeHtml(m.name)}</div>
        <div class="meta-label">Metas feitas</div>
      </div>
      <div style="display:flex; align-items:center; gap:14px;">
        <div class="meta-value">${m.metas}</div>
        <div class="actions">
          <button class="icon-btn" data-progress="${m.id}" title="Ver progresso">📊</button>
          ${isAdmin ? `<button class="icon-btn" data-edit="${m.id}" title="Editar">✏️</button>` : ""}
        </div>
      </div>
    `;
    container.appendChild(card);
  });

  const top1 = sorted[0];
  if (top1 && prevTop1Id && top1.id !== prevTop1Id) {
    launchConfetti();
    showToast(`🎉 Novo TOP 1: ${top1.name}!`);
  }
  if (top1) prevTop1Id = top1.id;
  previousRanking = newPositions;

  container.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", (e) => {
      if (e.target.closest("button")) return;
      openProgressModal(parseInt(card.dataset.memberId));
    });
  });
  container.querySelectorAll("[data-progress]").forEach(btn => {
    btn.addEventListener("click", (e) => { e.stopPropagation(); openProgressModal(parseInt(btn.dataset.progress)); });
  });
  container.querySelectorAll("[data-edit]").forEach(btn => {
    btn.addEventListener("click", (e) => { e.stopPropagation(); openEditModal(parseInt(btn.dataset.edit)); });
  });
}

function escapeHtml(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}

function launchConfetti() {
  const colors = ["#ffd700", "#fff", "#6fffb0", "#ff8080", "#c0c0c0"];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.top = "-10px";
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (1.5 + Math.random() * 1.5) + "s";
    c.style.animationDelay = (Math.random() * 0.5) + "s";
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    c.style.width = (6 + Math.random() * 8) + "px";
    c.style.height = c.style.width;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3500);
  }
}

let toastTimeout;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove("show"), 3000);
}

function setupEvents() {
  document.getElementById("loginBtn").addEventListener("click", openLogin);
  document.getElementById("loginCancel").addEventListener("click", closeLogin);
  document.getElementById("loginConfirm").addEventListener("click", confirmLogin);
  document.getElementById("passwordInput").addEventListener("keydown", (e) => { if (e.key === "Enter") confirmLogin(); });
  document.getElementById("logoutBtn").addEventListener("click", logout);
  document.getElementById("resetBtn").addEventListener("click", resetAll);
  document.getElementById("editCancel").addEventListener("click", closeEditModal);
  document.getElementById("editSave").addEventListener("click", saveEdit);
  document.getElementById("progressClose").addEventListener("click", closeProgressModal);
  document.getElementById("searchInput").addEventListener("input", (e) => { searchTerm = e.target.value; renderRanking(); });

  document.querySelectorAll(".modal-overlay").forEach(overlay => {
    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) {
        overlay.classList.remove("active");
        if (overlay.id === "progressModal") destroyChart();
      }
    });
  });

  document.querySelectorAll(".btn").forEach(btn => {
    btn.addEventListener("mousemove", (e) => {
      const rect = btn.getBoundingClientRect();
      btn.style.setProperty("--x", (e.clientX - rect.left) + "px");
      btn.style.setProperty("--y", (e.clientY - rect.top) + "px");
    });
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      document.querySelectorAll(".modal-overlay.active").forEach(o => o.classList.remove("active"));
      destroyChart();
    }
  });
}

function openLogin() {
  document.getElementById("passwordInput").value = "";
  document.getElementById("loginError").textContent = "";
  document.getElementById("loginModal").classList.add("active");
  setTimeout(() => document.getElementById("passwordInput").focus(), 100);
}
function closeLogin() { document.getElementById("loginModal").classList.remove("active"); }
function confirmLogin() {
  const pass = document.getElementById("passwordInput").value;
  if (pass === ADMIN_PASSWORD) {
    isAdmin = true;
    sessionStorage.setItem(ADMIN_KEY, "true");
    updateAdminUI();
    renderRanking();
    closeLogin();
    showToast("✅ Admin logado com sucesso!");
  } else {
    document.getElementById("loginError").textContent = "❌ Senha incorreta!";
  }
}
function logout() {
  isAdmin = false;
  sessionStorage.removeItem(ADMIN_KEY);
  updateAdminUI();
  renderRanking();
  showToast("👋 Você saiu do modo admin");
}

function openEditModal(id) {
  if (!isAdmin) return;
  const member = members.find(m => m.id === id);
  if (!member) return;
  editingId = id;
  document.getElementById("editName").value = member.name;
  document.getElementById("editMeta").value = member.metas;
  document.getElementById("editModal").classList.add("active");
}
function closeEditModal() {
  editingId = null;
  document.getElementById("editModal").classList.remove("active");
}
async function saveEdit() {
  if (editingId === null) return;
  const member = members.find(m => m.id === editingId);
  if (!member) return;
  const newName = document.getElementById("editName").value.trim();
  const newMeta = parseInt(document.getElementById("editMeta").value) || 0;
  if (!newName) { alert("O nome não pode ficar vazio!"); return; }
  const updated = { ...member };
  const oldMeta = updated.metas;
  updated.name = newName;
  updated.metas = Math.max(0, newMeta);
  if (oldMeta !== updated.metas) {
    if (!updated.history) updated.history = [];
    updated.history.push({ date: new Date().toISOString(), metas: updated.metas });
    if (updated.history.length > 100) updated.history = updated.history.slice(-100);
  }
  try {
    await saveMemberRemote(updated);
    closeEditModal();
    showToast("💾 Salvo com sucesso!");
  } catch (e) {
    alert("Erro ao salvar: " + e.message);
  }
}

async function resetAll() {
  if (!isAdmin) return;
  if (confirm("Tem certeza que deseja resetar TODOS os membros? Essa ação não pode ser desfeita.")) {
    try {
      await resetAllRemote();
      showToast("🔄 Todos os dados foram resetados");
    } catch (e) { alert("Erro: " + e.message); }
  }
}

function openProgressModal(id) {
  const member = members.find(m => m.id === id);
  if (!member) return;
  document.getElementById("progressTitle").textContent = `📊 ${member.name}`;
  const history = member.history || [];
  const current = member.metas;
  const max = history.length ? Math.max(...history.map(h => h.metas), current) : current;
  const first = history.length ? history[0].metas : current;
  const delta = current - first;
  animateCount("statCurrent", current);
  animateCount("statMax", max);
  const deltaEl = document.getElementById("statDelta");
  deltaEl.className = "stat-value";
  if (delta > 0) { deltaEl.classList.add("up"); deltaEl.textContent = `+${delta}`; }
  else if (delta < 0) { deltaEl.classList.add("down"); deltaEl.textContent = `${delta}`; }
  else { deltaEl.textContent = "0"; }
  renderChart(member);
  renderHistoryList(member);
  document.getElementById("progressModal").classList.add("active");
}

function animateCount(elId, target) {
  const el = document.getElementById(elId);
  const duration = 600;
  const startTime = performance.now();
  function tick(now) {
    const p = Math.min((now - startTime) / duration, 1);
    el.textContent = Math.floor(target * p);
    if (p < 1) requestAnimationFrame(tick);
    else el.textContent = target;
  }
  requestAnimationFrame(tick);
}

function closeProgressModal() {
  document.getElementById("progressModal").classList.remove("active");
  destroyChart();
}
function destroyChart() { if (chartInstance) { chartInstance.destroy(); chartInstance = null; } }

function renderChart(member) {
  destroyChart();
  const history = member.history || [];
  let labels = [], data = [];
  if (history.length === 0) { labels = ["Início"]; data = [member.metas]; }
  else {
    history.forEach(h => {
      const d = new Date(h.date);
      labels.push(d.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));
      data.push(h.metas);
    });
  }
  const ctx = document.getElementById("progressChart").getContext("2d");
  const gradient = ctx.createLinearGradient(0, 0, 0, 280);
  gradient.addColorStop(0, "rgba(255,255,255,0.4)");
  gradient.addColorStop(1, "rgba(255,255,255,0.0)");
  chartInstance = new Chart(ctx, {
    type: "line",
    data: { labels, datasets: [{
      label: "Metas", data,
      borderColor: "#ffffff", borderWidth: 2.5,
      backgroundColor: gradient, fill: true, tension: 0.35,
      pointBackgroundColor: "#fff", pointBorderColor: "#fff",
      pointRadius: 4, pointHoverRadius: 7, pointHoverBackgroundColor: "#ffd700"
    }]},
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 1000, easing: 'easeOutQuart' },
      plugins: {
        legend: { display: false },
        tooltip: { backgroundColor: "rgba(0,0,0,0.85)", borderColor: "rgba(255,255,255,0.3)", borderWidth: 1, titleColor: "#fff", bodyColor: "#fff", padding: 10 }
      },
      scales: {
        x: { ticks: { color: "rgba(255,255,255,0.6)", maxRotation: 0, autoSkip: true, maxTicksLimit: 6 }, grid: { color: "rgba(255,255,255,0.05)" } },
        y: { beginAtZero: true, ticks: { color: "rgba(255,255,255,0.6)", precision: 0 }, grid: { color: "rgba(255,255,255,0.08)" } }
      }
    }
  });
}

function renderHistoryList(member) {
  const list = document.getElementById("historyList");
  const history = [...(member.history || [])].reverse();
  if (history.length === 0) { list.innerHTML = `<div class="empty-msg">Ainda não há histórico de alterações.</div>`; return; }
  list.innerHTML = "";
  history.forEach((h, idx) => {
    const d = new Date(h.date);
    const dateStr = d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    const chronological = member.history;
    const origIdx = chronological.length - 1 - idx;
    let deltaHtml = "";
    if (origIdx > 0) {
      const diff = h.metas - chronological[origIdx - 1].metas;
      if (diff > 0) deltaHtml = `<span class="history-delta up">+${diff}</span>`;
      else if (diff < 0) deltaHtml = `<span class="history-delta down">${diff}</span>`;
    }
    const item = document.createElement("div");
    item.className = "history-item";
    item.innerHTML = `<span class="history-date">${dateStr}</span><span><span class="history-val">${h.metas}</span>${deltaHtml}</span>`;
    list.appendChild(item);
  });
}

buildLoaderLogo();
buildTitle();
spawnParticles();
checkAdminSession();
setupEvents();
initFirebase();

setTimeout(() => {
  if (!document.getElementById("loader").classList.contains("hidden")) {
    document.getElementById("loaderStatus").textContent = "⚠️ Verifique sua config do Firebase";
  }
}, 8000);
</script>
</body>
</html>
