<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat conversa</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#000000,#0f2027);
  color:white;
}
.center {
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  backdrop-filter: blur(10px);
}
.box {
  background: rgba(20,20,20,0.6);
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:300px;
  text-align:center;
  box-shadow: 0 0 20px rgba(0,255,150,0.2);
}
input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background: rgba(255,255,255,0.05);
  color:white;
}
button {
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:8px;
  background: linear-gradient(90deg,#00ff99,#00cc66);
  color:black;
  font-weight:bold;
}
#chat {
  display:none;
  flex-direction:column;
  height:100vh;
}
header {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  padding:10px;
  text-align:center;
  font-weight:bold;
}
#msgs {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.msg {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding:10px;
  border-radius:12px;
  max-width:80%;
}
.msg small {
  opacity:0.6;
  display:block;
  margin-bottom:5px;
}
.msg img {
  max-width:180px;
  max-height:180px;
  border-radius:10px;
  margin-top:5px;
}
#inputArea {
  display:flex;
  gap:5px;
  padding:10px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}
#inputArea input[type=text] {
  flex:1;
}
</style>
</head>
<body><div id="pass" class="center">
<div class="box">
<h3>🔐 Acesso</h3>
<input id="senha" placeholder="Senha" />
<button onclick="checkPass()">Entrar</button>
</div>
</div><div id="age" class="center" style="display:none">
<div class="box">
<h3>🔞 +18</h3>
<button onclick="enter()">Tenho +18</button>
</div>
</div><div id="chat">
<header>💬 Chat Global</header>
<div id="msgs"></div>
<div id="inputArea">
<input id="msg" placeholder="Mensagem" />
<input type="file" id="file" accept="image/*" />
<button onclick="sendMsg()">Enviar</button>
</div>
</div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzDkVO2B3ciIhaenUICcJp5welOj5qsA",
  authDomain: "chatjk-293bd.firebaseapp.com",
  databaseURL: "https://chatjk-293bd-default-rtdb.firebaseio.com",
  projectId: "chatjk-293bd",
  storageBucket: "chatjk-293bd.appspot.com",
  messagingSenderId: "617729806369",
  appId: "1:617729806369:web:85e31bbbcadd10e40ad360"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const chatRef = ref(db, "chat");

let user = localStorage.getItem('user');

function askName(){
  user = prompt('Digite seu nome no chat:');
  if(!user || user.trim()===''){
    user = 'Anônimo';
  }
  localStorage.setItem('user', user);
}

if(!user){
  askName();
}

window.checkPass = function(){
  if(document.getElementById('senha').value === 'julia12k'){
    document.getElementById('pass').style.display='none';
    document.getElementById('age').style.display='flex';
  } else alert('Senha errada');
}

window.enter = function(){
  document.getElementById('age').style.display='none';
  document.getElementById('chat').style.display='flex';
}

function time(){
  let d = new Date();
  return d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0');
}

window.sendMsg = function(){
  let text = document.getElementById('msg').value;
  if(!text) return;
  push(chatRef, { user, text, time: time() });
  document.getElementById('msg').value='';
}

file.onchange = ()=>{
  let fileInput = file.files[0];
  if(fileInput.size > 1024 * 1024){
    alert('Imagem muito grande (máx 1MB)');
    return;
  }
  let reader = new FileReader();
  reader.onload = ()=>{
    push(chatRef, { user, img: reader.result, time: time() });
  };
  reader.readAsDataURL(fileInput);
}

onChildAdded(chatRef, data => {
  let msg = data.val();
  let div = document.createElement('div');
  div.className='msg';
  div.innerHTML = `<small>${msg.user} • ${msg.time}</small>`;
  if(msg.text) div.innerHTML += `<div>${msg.text}</div>`;
  if(msg.img) div.innerHTML += `<img src="${msg.img}"/>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
});
</script></body>
</html>
