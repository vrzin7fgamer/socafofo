<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
}

canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

.center{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(15px);
}

.box{
  background:linear-gradient(145deg,#111,#000);
  border:1px solid #ffd70033;
  box-shadow:0 0 30px rgba(255,215,0,0.2), inset 0 0 10px rgba(255,215,0,0.1);
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
  transform: perspective(800px) rotateX(5deg);
}

.box h3{color:#ffd700;}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  color:white;
}

input::placeholder{
  color:rgba(255,255,255,0.3);
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ffd700,#ffcc00);
  color:black;
  font-weight:bold;
}

#chat{
  display:none;
  flex-direction:column;
  height:100vh;
}

header{
  background:rgba(0,0,0,0.6);
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  font-size:14px;
}

#onlineList{
  font-size:12px;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
}

.onlineUser{
  display:flex;
  align-items:center;
  gap:5px;
}

.dot{
  width:8px;
  height:8px;
  background:#00ff00;
  border-radius:50%;
}

#typingView{
  font-size:12px;
  color:#ffd700;
  padding-left:12px;
}

/* MAIS ESPAÇO NAS MENSAGENS */
#msgs{
  flex:1;
  overflow-y:auto;
  padding:15px 12px 20px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.msgRow{
  display:flex;
  gap:8px;
}

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:#000;
}

.msg{
  background:rgba(255,255,255,0.07);
  padding:12px;
  border-radius:12px;
  font-size:16px;
  max-width:80%;
  line-height:1.5;
}

.msg small{
  color:#ffd700;
  display:block;
  margin-bottom:5px;
}

/* INPUT MELHORADO */
#inputArea{
  display:flex;
  gap:10px;
  padding:15px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  border-top:1px solid rgba(255,255,255,0.05);
}

#msg{
  flex:1;
  padding:16px;
  font-size:17px;
  border-radius:12px;
}

#inputArea button{
  width:75px;
  padding:12px;
  border-radius:12px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="pass" class="center">
<div class="box">
<h3>🔐 Acesso</h3>
<input id="senha" placeholder="Digite a senha">
<button onclick="checkPass()">Entrar</button>
</div>
</div>

<div id="age" class="center" style="display:none">
<div class="box">
<h3>🔞 Área 18+</h3>
<button onclick="enter()">Continuar</button>
</div>
</div>

<div id="nameScreen" class="center" style="display:none">
<div class="box">
<h3>👤 Seu Nome</h3>
<input id="nameInput" placeholder="Digite seu nome">
<button onclick="saveName()">Entrar</button>
</div>
</div>

<div id="chat">
<header>
<div>💬 Chat</div>
<div id="onlineList"></div>
</header>

<div id="typingView"></div>
<div id="msgs"></div>

<div id="inputArea">
<input id="msg" placeholder="Digite aqui..." oninput="typing()">
<button onclick="sendMsg()">Enviar</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "chatjk-293bd.firebaseapp.com",
  databaseURL: "https://chatjk-293bd-default-rtdb.firebaseio.com",
  projectId: "chatjk-293bd"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chatRef = ref(db,"chat");
const onlineRef = ref(db,"online");
const typingRef = ref(db,"typing");

let user = localStorage.getItem("user");
let id = Math.random().toString(36).slice(2,7);
let lastMsg = 0;

function getColor(name){
  let colors=["#ffd700","#ffcc00","#ffaa00","#ff8800","#ffee00"];
  return colors[name.charCodeAt(0)%colors.length];
}

window.checkPass=()=>{
  if(senha.value==="julia12k"){
    pass.style.display="none";
    age.style.display="flex";
  } else alert("Senha errada");
}

window.enter=()=>{
  age.style.display="none";
  if(!user){nameScreen.style.display="flex";} else start();
}

window.saveName=()=>{
  let nome=nameInput.value.trim();
  if(nome.length<3){alert("Nome muito curto");return;}
  user=nome.slice(0,12);
  localStorage.setItem("user",user);
  nameScreen.style.display="none";
  start();
}

function start(){
  chat.style.display="flex";
  let userRef = ref(db,"online/"+id);
  set(userRef,user);
  onDisconnect(userRef).remove();
}

function now(){
  let d=new Date();
  return d.getHours().toString().padStart(2,'0')+":"+
         d.getMinutes().toString().padStart(2,'0');
}

window.sendMsg=()=>{
  let text=msg.value.trim();
  if(!text) return;

  let nowTime=Date.now();
  if(nowTime-lastMsg<800) return;
  lastMsg=nowTime;

  if(text==="/limpa"){
    remove(chatRef);
    msg.value="";
    return;
  }

  push(chatRef,{
    user,
    text,
    time:now(),
    senha:"julia12k"
  });

  msg.value="";
}

msg.addEventListener("keypress",e=>{
  if(e.key==="Enter") sendMsg();
});

onChildAdded(chatRef,data=>{
  let m=data.val();

  let row=document.createElement("div");
  row.className="msgRow";

  let avatar=document.createElement("div");
  avatar.className="avatar";
  avatar.style.background=getColor(m.user);
  avatar.innerText=m.user[0].toUpperCase();

  let div=document.createElement("div");
  div.className="msg";

  div.innerHTML=`<small>${m.user} • ${m.time}</small>${m.text}`;

  row.appendChild(avatar);
  row.appendChild(div);

  msgs.appendChild(row);
  msgs.scrollTop=msgs.scrollHeight;
});

onValue(onlineRef,s=>{
  let data=s.val()||{};
  onlineList.innerHTML="";

  Object.values(data).forEach(nome=>{
    let div=document.createElement("div");
    div.className="onlineUser";
    div.innerHTML=`<div class="dot"></div><span>${nome}</span>`;
    onlineList.appendChild(div);
  });
});

window.typing=()=>{
  set(ref(db,"typing/"+id),user);
  setTimeout(()=>set(ref(db,"typing/"+id),null),1500);
}

onValue(typingRef,s=>{
  let d=s.val()||{};
  let names=Object.values(d).filter(n=>n&&n!==user);
  typingView.innerText=names.length?names.join(", ")+" está digitando...":"";
});

// partículas
const c=document.getElementById("bg");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<80;i++){
  p.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  p.forEach(o=>{
    ctx.fillStyle="white";
    ctx.fillRect(o.x,o.y,2,2);
    o.y+=0.3;
    if(o.y>c.height)o.y=0;
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
